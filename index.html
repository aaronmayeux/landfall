<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#070D18">
<title>Landfall</title>

<!--
  viewport-fit=cover + env(safe-area-inset-*) below is what lets the globe run
  edge to edge under the notch and the home indicator while the CONTROLS stay
  out of the OS gesture zones. SPEC §16's thumb-zone rule.
-->

<link rel="preconnect" href="https://unpkg.com" crossorigin>
<link rel="preconnect" href="https://tiles.openfreemap.org" crossorigin>
<link rel="preconnect" href="https://pub-72a4a9c118d14117ace3a2fc6660f8e0.r2.dev" crossorigin>
<link href="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.css" rel="stylesheet">
<link href="./ui/panels.css" rel="stylesheet">
<link href="./ui/home.css" rel="stylesheet">

<style>
/* ---------------------------------------------------------------------------
 * These custom properties are the ONLY place tokens.js values are restated,
 * and they exist because CSS cannot import from a JS module. main.js writes
 * them from tokens.js at boot (see applyTokens), so tokens.js stays the single
 * source of truth and this block is just the fallback for first paint.
 * ------------------------------------------------------------------------- */
:root {
  --ocean: #070D18;
  --space: #04070E;
  --space-near: #0A1626;
  --space-far: #02040A;
  --text-primary: #E8F1F8;
  --text-secondary: #9DB3C7;
  --text-muted: #647C93;
  --glass: rgba(10, 20, 34, 0.72);
  --glass-raised: rgba(16, 30, 48, 0.86);
  --glass-border: rgba(120, 190, 225, 0.16);
  --glass-shadow: rgba(0, 0, 0, 0.55);
  --focus-ring: #5FE0F5;
  --error: #E85D5D;
  --stale: #E0A93C;

  --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  --font-numeric: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;

  --touch-target: 44px;
  --radius: 10px;
  --radius-large: 16px;

  --space-tight: 4px;
  --space-snug: 8px;
  --space-base: 12px;
  --space-comfy: 16px;

  --duration-instant: 90ms;
  --duration-base: 240ms;
  --ease-settle: cubic-bezier(0.16, 1, 0.3, 1);
  --ease-swap: cubic-bezier(0.4, 0, 0.2, 1);

  /* Safe areas, with a floor. On a device with no notch the inset is 0, and
     controls flush to the bottom edge are still wrong — the OS gesture bar is
     there regardless. The max() gives a minimum clearance either way. */
  --safe-top: max(env(safe-area-inset-top), 12px);
  --safe-bottom: max(env(safe-area-inset-bottom), 20px);
  --safe-left: max(env(safe-area-inset-left), 12px);
  --safe-right: max(env(safe-area-inset-right), 12px);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  overflow: hidden;
  background: var(--ocean);
  color: var(--text-primary);
  font-family: var(--font-ui);
  /* The page must NEVER scroll while the user is dragging the globe. */
  overscroll-behavior: none;
  -webkit-tap-highlight-color: transparent;
}

/* --- The layer stack (SPEC §2 hybrid): space bg < MapLibre < 3D clear globe -
   MapLibre is the INPUT surface and owns the one zoom + camera; it starts at
   opacity 0 (you see the 3D globe) and globe3d.js fades it up as you zoom in.
   The #gl canvas on top is pointer-events:none — purely visual — so scroll,
   pinch, and drag all reach MapLibre everywhere. Opacity on #globe is driven
   per-frame, so it carries no CSS transition of its own.                      */
#spacebg {
  position: fixed;
  inset: 0;
  z-index: 0;
  background: radial-gradient(120% 120% at 42% 30%,
              var(--space-near) 0%, var(--space) 60%, var(--space-far) 100%);
  pointer-events: none;
}

#globe {
  position: fixed;
  inset: 0;
  z-index: 1;
  opacity: 0;             /* faded up by globe3d.js as you zoom into the map */
  /* Deliberate: the canvas owns all pointer gestures. Without this, a vertical
     drag on iOS Safari scrolls the page instead of panning the map. */
  touch-action: none;
}

/* The Three.js clear globe canvas — the top RENDER layer, but transparent to
   input so every gesture falls through to MapLibre below.
   width/height 100% is LOAD-BEARING: a canvas is a replaced element, so
   inset:0 positions it but does NOT stretch it — without these it displays at
   its raw pixel-buffer size (2-3x the screen on a phone), anchored top-left.
   That was the mobile "top-left quadrant" bug. At DPR 1 (desktop) buffer ==
   viewport and this changes nothing. */
#gl {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  display: block;
  pointer-events: none;
}

/* Home marker host. ABOVE both globe engines (#globe z1, #gl z2) and below the
   chrome, so the marker is visible across the entire dive — including the
   planet band, where #globe is still at opacity 0. Inert except for the
   off-screen pointer button, which re-enables pointer events on itself. */
#home-layer-host {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

/* The globe's focus ring.
 *
 * :focus-visible ALONE IS NOT ENOUGH HERE. #globe is a plain div made
 * focusable with tabindex; browsers apply the :focus-visible heuristic
 * inconsistently to non-form elements, so the ring silently failed to appear
 * when tabbing to the globe. Plain :focus is the reliable rule; the
 * :focus:not(:focus-visible) escape hatch below suppresses it for pointer
 * clicks, which is the behavior :focus-visible was wanted for in the first
 * place. Inset offset because the element is full-bleed — an outward ring
 * would be clipped at the viewport edge. */
#globe:focus {
  outline: 2px solid var(--focus-ring);
  outline-offset: -2px;
}
#globe:focus:not(:focus-visible) {
  outline: none;
}

/* Positioning lives on #attrib-host (a fixed sibling of #globe); MapLibre's
 * own corner container is inert once the control is mounted there. */
/* MapLibre's attribution, in COMPACT mode (AttributionControl compact:true).
 *
 * Read maplibre-gl.css before touching this. Compact mode sets, on its own:
 *   .maplibregl-ctrl-attrib.maplibregl-compact { background:#fff; color:#000 }
 *   .maplibregl-ctrl-attrib-button { position:absolute; width:24px; height:24px }
 *   ...-compact .maplibregl-ctrl-attrib-inner { display:none }  (until expanded)
 *
 * Two bugs were fixed here, both from styling this blind:
 *
 * 1. UNREADABLE TEXT. Overriding the background to dark glass while only
 *    recoloring `a` left MapLibre's `color:#000` on the container, so the
 *    non-link text (the ©, the separators) was BLACK on a dark background.
 *    It was never a contrast-against-the-map problem — it was black on dark
 *    everywhere, including over empty space. The container itself must be
 *    recolored, not just the links.
 *
 * 2. DISAPPEARING BUTTON. The toggle is absolutely positioned in a ~24px box.
 *    Forcing min-width/min-height to 44px burst it out of that box and the
 *    icon vanished. Do NOT set a 44px box here. The touch target is enlarged
 *    with a transparent ::after overlay instead, which grows the hit area
 *    without touching layout. */
.maplibregl-ctrl-attrib.maplibregl-compact,
.maplibregl-ctrl-attrib {
  background-color: var(--glass-raised) !important;
  color: var(--text-secondary) !important;
  border-radius: var(--radius);
  font-size: 11px;
}
.maplibregl-ctrl-attrib a,
.maplibregl-ctrl-attrib .maplibregl-ctrl-attrib-inner {
  color: var(--text-secondary) !important;
}
.maplibregl-ctrl-attrib a:hover { color: var(--text-primary) !important; }

/* The "i" toggle. Keep MapLibre's 24px box; invert the icon so the dark-on-
 * light glyph reads on dark glass. */
.maplibregl-ctrl-attrib-button {
  background-color: transparent !important;
  filter: invert(1) opacity(0.75);
}
@media (hover: hover) {
  .maplibregl-ctrl-attrib-button:hover { filter: invert(1) opacity(1); }
}

/* 44px hit area without changing the 24px layout box (SPEC §10). */
.maplibregl-ctrl-attrib-button::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: var(--touch-target);
  height: var(--touch-target);
  transform: translate(-50%, -50%);
}
.maplibregl-ctrl-attrib-button:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
}

/* MapLibre scopes two compact-mode rules to its own corner containers
 * (.maplibregl-ctrl-bottom-left > ...), which no longer match now that the
 * control is mounted in #attrib-host. Replicated here so the expanded panel
 * pads the correct side and the "i" stays on the left. Without these the
 * button jumps to the right edge and the expanded text is padded backwards. */
#attrib-host .maplibregl-ctrl-attrib-button { left: 0; right: auto; }
#attrib-host .maplibregl-ctrl-attrib.maplibregl-compact-show {
  padding: 2px 8px 2px 28px;
  border-radius: 12px;
}
/* The control keeps MapLibre's default 10px margin from the corner container
 * it is no longer in; the host owns safe-area offset, so zero it out. */
#attrib-host .maplibregl-ctrl { margin: 0; }

/* --- Status strip: top edge. Silent when everything is clean (SPEC §16) -- */
#status {
  position: fixed;
  top: var(--safe-top);
  left: var(--safe-left);
  right: var(--safe-right);
  z-index: 20;
  display: flex;
  justify-content: center;
  pointer-events: none;
}

#status .chip {
  pointer-events: auto;
  padding: var(--space-snug) var(--space-base);
  background: var(--glass);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: 999px;
  font-size: 12px;
  letter-spacing: 0.02em;
  color: var(--text-secondary);
  box-shadow: 0 4px 20px var(--glass-shadow);
  opacity: 0;
  transform: translateY(-6px);
  transition: opacity var(--duration-base) var(--ease-settle),
              transform var(--duration-base) var(--ease-settle);
}
#status .chip[data-visible="true"] { opacity: 1; transform: translateY(0); }
#status .chip[data-tone="error"] { color: var(--error); }
#status .chip[data-tone="stale"] { color: var(--stale); }

/* --- Control cluster: bottom-RIGHT vertical stack (SPEC §16) -------------
   Bottom-right because you may be holding a phone one-handed in the rain.
   Reachability beats keeping the globe unobscured.                         */
/* Attribution host — a SIBLING of #globe, never a child.
 *
 * MapLibre normally mounts its controls inside the map element, but #globe's
 * opacity is driven per-frame by the dive crossfade (globe3d.js). Opacity on a
 * parent composites everything inside it, so the attribution faded out with
 * the basemap and was nearly invisible at the space floor — while remaining
 * correct zoomed in. Chrome must never live inside an animating-opacity
 * element. Same reasoning as #controls, and the same z-index band. */
#attrib-host {
  position: fixed;
  left: var(--safe-left);
  bottom: var(--safe-bottom);
  z-index: 40;
}

/* --- Map controls: bottom-right, clear of the OS gesture zone ------------ */
#controls {
  position: fixed;
  right: var(--safe-right);
  bottom: var(--safe-bottom);
  z-index: 40;
  display: flex;
  flex-direction: column;
  gap: var(--space-snug);
}

.control {
  width: var(--touch-target);
  height: var(--touch-target);
  display: grid;
  place-items: center;
  background: var(--glass-raised);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  color: var(--text-secondary);
  cursor: pointer;
  box-shadow: 0 4px 20px var(--glass-shadow);
  /* Transform and opacity ONLY. */
  transition: transform var(--duration-instant) var(--ease-swap),
              opacity var(--duration-instant) var(--ease-swap);
  -webkit-appearance: none;
  appearance: none;
  padding: 0;
}

.control svg { width: 20px; height: 20px; display: block; }

/* Capability, not device class. A touchscreen laptop gets both. */
@media (hover: hover) {
  .control:hover { color: var(--text-primary); transform: scale(1.04); }
}
.control:active { transform: scale(0.94); }

.control:focus-visible {
  outline: 2px solid var(--focus-ring);
  outline-offset: 2px;
  color: var(--text-primary);
}

.control[disabled] {
  opacity: 0.38;
  cursor: default;
}

/* --- Boot veil ----------------------------------------------------------
   Covers the moment between first paint and the globe having a style. Fades
   on opacity only. Without it you see a flash of flat background before the
   opening sequence starts, which reads as a stutter.                       */
#veil {
  position: fixed;
  inset: 0;
  z-index: 50;
  background: var(--ocean);
  pointer-events: none;
  opacity: 1;
  transition: opacity 600ms var(--ease-settle);
}
#veil[data-lifted="true"] { opacity: 0; }

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* Screen-reader-only. The canvas is aria-hidden; this is how the globe
   announces itself until the storm list exists in Phase 2. */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}
</style>
</head>
<body>

<div id="spacebg"></div>
<div id="globe" role="application" aria-label="Interactive globe. Storm list is the primary navigation."></div>
<canvas id="gl" aria-hidden="true"></canvas>

<div id="status" aria-live="polite">
  <div class="chip" id="status-chip" data-visible="false"></div>
</div>

<!-- The storm list: ONE component that is the collapsed pill's target, the
     narrow bottom sheet, and the wide left rail. It is the accessibility
     surface — the canvas is aria-hidden; this list is authoritative. -->
<button id="storm-pill" type="button" data-hidden="false">Checking the oceans…</button>
<aside id="panel-storms" class="panel" data-open="false" aria-label="Storm list"></aside>

<!-- Storm detail replaces the LIST in the same visual slot (SPEC §16) — a
     sibling panel, same .panel docking, alternated by main.js wiring so only
     one is ever open. -->
<aside id="panel-detail" class="panel" data-open="false" aria-label="Storm detail"></aside>

<!-- Home setup: address search, geolocation, and the confirm-and-drag step.
     Same panel system as the storm list (SPEC §16: ONE panel system) — it
     docks as a bottom sheet when narrow and a rail when wide, from panels.css. -->
<aside id="panel-home" class="panel" data-open="false" aria-label="Home location"></aside>

<!-- The home marker layer lives HERE, not inside #globe, for exactly the same
     reason as the attribution below: #globe's opacity is animated from 0 by the
     dive crossfade, and opacity on a parent fades EVERYTHING inside it. Mounted
     in the map container, the marker was invisible at the planet band — the one
     zoom where an off-screen home most needs an indicator. Sits above #gl (the
     clear globe) so it survives both engines, and stays pointer-transparent
     except for the pointer button itself. -->
<div id="home-layer-host"></div>

<!-- Attribution lives HERE, not inside #globe. #globe's opacity is animated by
     the dive crossfade, and opacity on a parent fades everything inside it —
     chrome included. MapLibre mounts its AttributionControl into this fixed
     host instead (see createGlobe), so it stays fully opaque at every zoom. -->
<div id="attrib-host"></div>

<nav id="controls" aria-label="Map controls">
  <button class="control" id="btn-storms" type="button"
          aria-label="Toggle storm list" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="2.6"/>
      <path d="M14.5 11.5a8 8 0 0 0-6-7.2M9.5 12.5a8 8 0 0 0 6 7.2"/>
    </svg>
  </button>
  <button class="control" id="btn-home" type="button"
          aria-label="Set or review home location" aria-expanded="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M4 11.5 12 4l8 7.5"/><path d="M6.5 10v9.5h11V10"/>
    </svg>
  </button>
  <button class="control" id="btn-recenter" type="button" aria-label="Recenter globe">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="2.5"/>
      <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
    </svg>
  </button>
  <button class="control" id="btn-graticule" type="button"
          aria-label="Toggle coordinate grid" aria-pressed="false">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"
         stroke-linecap="round" aria-hidden="true">
      <circle cx="12" cy="12" r="9"/>
      <path d="M3 12h18M12 3v18"/>
      <ellipse cx="12" cy="12" rx="4.2" ry="9"/>
    </svg>
  </button>
</nav>

<div id="veil"></div>

<script src="https://unpkg.com/maplibre-gl@5.6.0/dist/maplibre-gl.js"></script>
<!-- No pmtiles library here anymore: the R2 basemap is served as ordinary
     tile URLs by the Pages Function tile proxy (functions/tiles/). The
     .pmtiles format is read server-side only. -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script type="module" src="./main.js"></script>
</body>
</html>
